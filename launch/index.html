    <script>
      // Set the target date as January 08, 2025 at 10:45 AM
      const targetDate = new Date("January 08, 2025 10:45:00");

      // Get the current date and time
      const currentDate = new Date();

      // Calculate the difference in milliseconds
      const difference = targetDate - currentDate;

      // Convert the difference into days, hours, minutes, and seconds
      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor(
        (difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
      );
      const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((difference % (1000 * 60)) / 1000);

      // Log the countdown to the console
      console.log(
        `Countdown: ${days} days, ${hours} hours, ${minutes} minutes, ${seconds} seconds`,
      );
      const d = new Date("August 02, 2026 1:00:00");

      // default example

        // day: d.getDate()
        year: 2026,
        month: 8,
        day: 2,
        hours: 1,
        minutes: 0,
        seconds: 0,
      });
